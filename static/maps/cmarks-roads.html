<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>C-MARKS — Chennai Road Cut Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
  #map { position: fixed; inset: 0; width: 100%; height: 100%; }

  /* ── Title box ── */
  .map-title {
    position: absolute;
    top: 14px; left: 14px; z-index: 1000;
    background: #fff;
    border-radius: 10px;
    padding: 12px 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,.12);
    max-width: 290px;
  }
  .map-title h1 {
    font-size: 13px; font-weight: 700; color: #111827;
    letter-spacing: .03em; line-height: 1.3;
  }
  .map-title p {
    font-size: 11px; color: #6b7280; margin-top: 3px; line-height: 1.4;
  }

  /* ── Legend ── */
  .map-legend {
    position: absolute;
    bottom: 28px; left: 14px; z-index: 1000;
    background: #fff;
    border-radius: 10px;
    padding: 12px 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,.12);
    min-width: 170px;
  }
  .map-legend h3 {
    font-size: 10px; font-weight: 600; color: #6b7280;
    text-transform: uppercase; letter-spacing: .07em; margin-bottom: 8px;
  }
  .legend-item {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: #374151; margin-bottom: 6px;
  }
  .legend-item:last-child { margin-bottom: 0; }
  .legend-dot {
    width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
    border: 2px solid rgba(0,0,0,.15);
  }
  .legend-count {
    margin-left: auto; font-size: 11px; color: #9ca3af; font-weight: 500;
  }
  .legend-road {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: #374151; margin-top: 10px;
    padding-top: 10px; border-top: 1px solid #f3f4f6;
  }
  .legend-line {
    width: 22px; height: 2px; background: #374151; opacity: .5; flex-shrink: 0;
  }

  /* ── Info panel ── */
  .info-panel {
    position: absolute;
    top: 14px; right: 14px; z-index: 1000;
    background: #fff;
    border-radius: 10px;
    padding: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,.12);
    width: 270px;
    display: none;
  }
  .info-panel.visible { display: block; }
  .info-close {
    position: absolute; top: 10px; right: 12px;
    background: none; border: none; cursor: pointer;
    font-size: 16px; color: #9ca3af; line-height: 1;
  }
  .info-close:hover { color: #374151; }
  .info-id {
    font-size: 10px; font-weight: 600; color: #6b7280;
    text-transform: uppercase; letter-spacing: .07em; margin-bottom: 6px;
  }
  .info-location {
    font-size: 14px; font-weight: 700; color: #111827; margin-bottom: 4px; line-height: 1.3;
  }
  .info-road {
    font-size: 11px; color: #6b7280; margin-bottom: 10px; line-height: 1.4;
  }
  .info-status {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600;
    margin-bottom: 12px;
  }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
  }
  .info-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  }
  .info-field label {
    font-size: 10px; font-weight: 600; color: #9ca3af;
    text-transform: uppercase; letter-spacing: .05em; display: block; margin-bottom: 2px;
  }
  .info-field span {
    font-size: 12px; color: #374151; font-weight: 500;
  }
  .info-purpose {
    grid-column: 1 / -1;
  }

  /* ── Default panel ── */
  .info-default {
    position: absolute;
    top: 14px; right: 14px; z-index: 1000;
    background: #fff;
    border-radius: 10px;
    padding: 14px 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,.12);
    width: 220px;
    font-size: 12px; color: #6b7280; line-height: 1.5;
    text-align: center;
  }
  .info-default.hidden { display: none; }
  .info-default .click-icon { font-size: 22px; margin-bottom: 6px; }
</style>
</head>

</div>

// ── Status styling ─────────────────────────────────────────────────────────────
const STATUS_COLOR = {
  'Approved':     '#16a34a',
  'Pending':      '#d97706',
  'Rejected':     '#ef4444',
  'Under Review': '#3b82f6',
};
const STATUS_BG = {
  'Approved':     '#f0fdf4',
  'Pending':      '#fffbeb',
  'Rejected':     '#fef2f2',
  'Under Review': '#eff6ff',
};

// ── Map init ───────────────────────────────────────────────────────────────────
const map = L.map('map', {
  center: [13.04, 80.24],
  zoom: 12,
  zoomControl: true,
  attributionControl: true,
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}@2x.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 19,
}).addTo(map);

// ── Road network ───────────────────────────────────────────────────────────────
L.geoJSON(ROAD_DATA, {
  style: {
    color: '#374151',
    weight: 0.8,
    opacity: 0.6,
  },
  interactive: false,
}).addTo(map);

// ── Info panel helpers ─────────────────────────────────────────────────────────
const infoPanel   = document.getElementById('infoPanel');
const infoDefault = document.getElementById('infoDefault');

function showInfo(m) {
  infoDefault.classList.add('hidden');
  infoPanel.classList.add('visible');

  document.getElementById('infoId').textContent       = m.id;
  document.getElementById('infoLocation').textContent  = m.location;
  document.getElementById('infoRoad').textContent      = m.road;
  document.getElementById('infoApplicant').textContent = m.applicant;
  document.getElementById('infoCutLength').textContent = m.cutLength + ' m';
  document.getElementById('infoDate').textContent      = m.appDate;
  document.getElementById('infoPurpose').textContent   = m.purpose;

  const color = STATUS_COLOR[m.status] || '#6b7280';
  const bg    = STATUS_BG[m.status]    || '#f9fafb';
  document.getElementById('statusText').textContent    = m.status;
  document.getElementById('statusDot').style.background = color;
  const statusEl = document.getElementById('infoStatus');
  statusEl.style.background = bg;
  statusEl.style.color      = color;
}

document.getElementById('infoClose').addEventListener('click', () => {
  infoPanel.classList.remove('visible');
  infoDefault.classList.remove('hidden');
});

// ── Road cut markers ───────────────────────────────────────────────────────────
MARKERS.forEach(m => {
  const color = STATUS_COLOR[m.status] || '#6b7280';

  const icon = L.divIcon({
    className: '',
    html: `<div style="
      width:16px; height:16px; border-radius:50%;
      background:${color};
      border: 2.5px solid #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,.35);
      cursor: pointer;
    "></div>`,
    iconSize: [16, 16],
    iconAnchor: [8, 8],
  });

  const marker = L.marker([m.lat, m.lng], { icon }).addTo(map);
  marker.on('click', () => showInfo(m));

  // Subtle tooltip on hover
  marker.bindTooltip(
    `<strong>${m.location}</strong><br>${m.status} — ${m.applicant}<br>${m.cutLength} m cut`,
    { direction: 'top', offset: [0, -10], className: 'leaflet-tooltip' }
  );
});
</script>
