<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Urban Logistics Suitability Model — Chennai Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',sans-serif;background:#0f172a}
#map{width:100%;height:100vh}

.map-title{
  position:absolute;top:14px;left:50%;transform:translateX(-50%);
  z-index:1000;background:rgba(15,23,42,0.92);
  border:1px solid rgba(255,255,255,0.12);border-radius:10px;
  padding:13px 22px;text-align:center;backdrop-filter:blur(8px);
  pointer-events:none;white-space:nowrap
}
.map-title h1{font-size:15px;font-weight:700;color:#f1f5f9;letter-spacing:.02em}
.map-title p{font-size:11px;color:#94a3b8;margin-top:4px;letter-spacing:.03em}

.legend{
  position:absolute;bottom:28px;left:16px;z-index:1000;
  background:rgba(15,23,42,0.90);border:1px solid rgba(255,255,255,0.10);
  border-radius:10px;padding:14px 18px;backdrop-filter:blur(8px);min-width:200px
}
.legend h3{font-size:11px;font-weight:600;color:#94a3b8;
  text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.legend-item{display:flex;align-items:center;gap:10px;
  margin-bottom:8px;font-size:12px;color:#e2e8f0}
.swatch{width:20px;height:16px;border-radius:3px;flex-shrink:0;opacity:.85}
.hub-dot{width:18px;height:18px;border-radius:50%;
  background:#3b82f6;border:2.5px solid #93c5fd;flex-shrink:0;
  display:flex;align-items:center;justify-content:center}
.hub-dot::after{content:'';width:5px;height:5px;
  background:#fff;border-radius:50%}

.info-panel{
  position:absolute;top:86px;right:16px;z-index:1000;
  background:rgba(15,23,42,0.93);border:1px solid rgba(255,255,255,0.12);
  border-radius:10px;padding:16px 20px;backdrop-filter:blur(8px);
  width:248px;display:none
}
.info-panel.visible{display:block}
.info-panel h3{font-size:11px;font-weight:600;color:#94a3b8;
  text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.comp{font-size:30px;font-weight:700;text-align:center;padding:6px 0 4px}
.badge{display:block;width:fit-content;margin:0 auto 12px;
  padding:2px 12px;border-radius:20px;font-size:11px;font-weight:600}
.s-row{display:flex;justify-content:space-between;align-items:baseline;
  padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.06);
  font-size:12px}
.s-row:last-of-type{border-bottom:none}
.s-lbl{color:#94a3b8;line-height:1.4}
.s-val{color:#e2e8f0;font-weight:500;font-variant-numeric:tabular-nums}
.bar-wrap{height:3px;background:rgba(255,255,255,0.08);border-radius:2px;margin-top:3px}
.bar{height:3px;border-radius:2px}
.close-btn{position:absolute;top:10px;right:12px;
  background:none;border:none;cursor:pointer;
  color:#64748b;font-size:17px;line-height:1;transition:color .2s}
.close-btn:hover{color:#e2e8f0}

.leaflet-popup-content-wrapper{
  background:rgba(15,23,42,0.93)!important;
  border:1px solid rgba(255,255,255,0.12)!important;
  border-radius:8px!important;color:#e2e8f0!important;
  font-family:'Inter',sans-serif!important
}
.leaflet-popup-tip{background:rgba(15,23,42,0.93)!important}
.leaflet-popup-content{font-size:12px;line-height:1.65}
</style>
</head>
<body>

<div class="map-title">
  <h1>Urban Logistics Suitability Model &mdash; Demo Output</h1>

</div>

<div class="legend">
  <h3>Suitability</h3>

  <div class="legend-item"><div class="swatch" style="background:#f59e0b"></div>Medium (0.40 &ndash; 0.65)</div>
  <div class="legend-item"><div class="swatch" style="background:#ef4444"></div>Low (&lt;0.40)</div>
  <div class="legend-item" style="margin-top:10px">
    <div class="hub-dot"></div>Optimal Hub Location
  </div>
</div>

<div class="info-panel" id="infoPanel">
  <button class="close-btn" onclick="document.getElementById('infoPanel').classList.remove('visible')">&#215;</button>

  <div class="comp" id="compScore"></div>
  <div class="badge" id="classBadge"></div>
  <div id="layerRows"></div>
</div>

  b.textContent         = f.cls+' Suitability';
  b.style.background    = BADGE_BG[f.cls];
  b.style.color         = BADGE_FG[f.cls];
  document.getElementById('layerRows').innerHTML =
    Object.keys(f.layers).map(k => {
      const pct = Math.round(f.layers[k]*100);
      const wt  = Math.round(LAYER_W[k]*100);
      return `<div class="s-row">
        <span class="s-lbl">${LAYER_LABELS[k]}<br>
          <span style="font-size:10px;color:#475569">wt ${wt}%</span></span>
        <span class="s-val">${f.layers[k].toFixed(3)}</span>
      </div>
      <div class="bar-wrap"><div class="bar" style="width:${pct}%;background:${LAYER_C[k]}"></div></div>`;
    }).join('');
  document.getElementById('infoPanel').classList.add('visible');
}

FEATURES.forEach(f => {
  const poly = L.polygon(f.poly.map(p=>[p[0],p[1]]),{
    color:f.color,fillColor:f.color,
    fillOpacity:.65,weight:.7,opacity:.85
  }).addTo(map);
  poly.on('click',()=>showInfo(f));
  poly.on('mouseover',function(){this.setStyle({fillOpacity:.88,weight:1.5})});
  poly.on('mouseout', function(){this.setStyle({fillOpacity:.65,weight:.7})});
});

const hubIcon = L.divIcon({
  html:`<div style="width:24px;height:24px;border-radius:50%;
    background:#3b82f6;border:2.5px solid #93c5fd;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 0 0 5px rgba(59,130,246,.22);">
    <div style="width:7px;height:7px;border-radius:50%;background:#fff;"></div></div>`,
  className:'',iconSize:[24,24],iconAnchor:[12,12],popupAnchor:[0,-14]
});

TOP5.forEach((h,i) => {
  L.marker([h.lat,h.lng],{icon:hubIcon}).addTo(map).bindPopup(
    `<strong>Optimal Hub #${i+1}</strong><br>
     Score: <strong style="color:#22c55e">${h.score.toFixed(3)}</strong><br>
     <span style="color:#94a3b8">${h.lat.toFixed(4)}&deg;N, ${h.lng.toFixed(4)}&deg;E</span>`
  );
});
</script>
</body>
</html>
